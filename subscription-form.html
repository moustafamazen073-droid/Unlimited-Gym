<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Form - Unlimited Gym</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="gym.css" />
  <style>
    .data input { height: auto; padding: 15px; font-size: 18px; }
    .data ::placeholder { font-size: 18px; }
    @media (max-width: 768px) {
      .data input { font-size: 16px; padding: 12px; }
      .data ::placeholder { font-size: 16px; }
      .options label { padding: 12px 20px; font-size: 14px; }
    }
  </style>

        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

<body>
  <div class="data">
    <div class="container py-5">
      <h1 class="text-center mb-5" style="color: #fecf2a">Please Fill This Application</h1>
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="input">
            <h4>Full Name <span class="text-danger">*</span></h4>
            <input type="text" id="fullName" class="form-control form-input mb-2" placeholder="Enter your full name" />
            <div id="nameError" class="error-message"></div>

            <h4>Age <span class="text-danger">*</span></h4>
            <input type="number" id="age" class="form-control form-input mb-2" placeholder="Enter your age" />
            <div id="ageError" class="error-message"></div>

            <h4>Mobile Number <span class="text-danger">*</span></h4>
            <input type="tel" id="mobile" class="form-control form-input mb-2" placeholder="Enter 11-digit mobile number" />
            <div id="mobileError" class="error-message"></div>

            <h4>Occupation</h4>
            <input type="text" id="occupation" class="form-control form-input mb-4" placeholder="Your occupation" />

            <h4>Any injuries or medical conditions?</h4>
            <input type="text" id="injuries" class="form-control form-input mb-4" placeholder="If none, leave empty" />

            <h4>Have you trained before?</h4>
            <input type="text" id="trainedBefore" class="form-control form-input mb-4" placeholder="Yes/No/Maybe" />

            <h4>Additional notes</h4>
            <input type="text" id="notes" class="form-control form-input mb-4" placeholder="Any additional notes" />
          </div>
        </div>
      </div>

      <div class="form">
        <div class="section">
          <h2>Choose your plan:</h2>
          <div class="options">
            <input type="radio" id="monthly" name="plan" value="monthly" />
            <label for="monthly">Monthly</label>
            <input type="radio" id="3month" name="plan" value="3 month" />
            <label for="3month">3 Month</label>
            <input type="radio" id="6month" name="plan" value="6 month" />
            <label for="6month">6 Month</label>
            <input type="radio" id="yearly" name="plan" value="yearly" />
            <label for="yearly">Yearly</label>
          </div>
        </div>

        <div class="section" id="sessionsBox" style="display: none">
          <h2>Choose number of sessions per week:</h2>
          <div class="options">
            <input type="radio" id="3sessions" name="sessions" value="3" />
            <label for="3sessions">3 Sessions</label>
            <input type="radio" id="everyday" name="sessions" value="Everyday" />
            <label for="everyday">Everyday</label>
          </div>
        </div>

        <h2 id="finalPrice"></h2>

        <div class="text-center">
          <button type="button" id="submitBtn" class="btn btn-warning btn-lg px-5 py-3 fs-3">Submit ✅</button>
        </div>

        <div class="text-center mt-4">
          <a href="index.html" class="text-warning text-decoration-none fs-5">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="gym.js"></script>
</body>
</html>
