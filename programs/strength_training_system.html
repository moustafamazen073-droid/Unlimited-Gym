<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strength Training - Unlimited Gym</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Link to main gym.css -->
    <link rel="stylesheet" href="../gym.css" />
    <style>
      body {
        background: linear-gradient(to left, #67540e, rgba(0, 0, 0, 0.959));
        min-height: 100vh;
        padding: 30px 15px;
      }
      .program_table {
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-top: 30px;
        color: #fecf2a;
        text-decoration: none;
        font-size: 1.2em;
        border: 2px solid #fecf2a;
        padding: 10px 30px;
        border-radius: 30px;
        transition: all 0.3s ease;
      }
      .back-link:hover {
        background-color: #fecf2a;
        color: black;
        transform: scale(1.05);
      }
      .table {
        color: white;
        border-radius: 20px;
        overflow: hidden;
      }
      .table thead th {
        background-color: rgba(254, 207, 42, 0.2);
        color: #fecf2a;
        border-bottom: 2px solid #fecf2a;
      }
      .table tbody td {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .table tbody tr:hover {
        background-color: rgba(254, 207, 42, 0.15);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="program_table">
        <h1 class="text-center">💪 STRENGTH TRAINING SYSTEM</h1>
        <p class="text-center fs-5">
          <strong>🔥 Who is it for?</strong> Perfect for those focused on building raw strength and hitting big numbers on compound lifts.
        </p>

        <h2 class="text-center mt-5">Strength Plan (3 Days)</h2>
        <div class="table-responsive">
          <table class="table table-dark table-hover">
            <thead>
              <tr>
                <th>Exercise</th>
                <th>Sets</th>
                <th>Reps</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Squat</td>
                <td>5</td>
                <td>5</td>
              </tr>
              <tr>
                <td>Bench Press</td>
                <td>5</td>
                <td>5</td>
              </tr>
              <tr>
                <td>Deadlift</td>
                <td>3</td>
                <td>5</td>
              </tr>
              <tr>
                <td>Pull-ups</td>
                <td>3</td>
                <td>8</td>
              </tr>
              <tr>
                <td>Core Work</td>
                <td>3</td>
                <td>15</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="text-center">
          <a href="../index.html#programs" class="back-link"
            >← Back to Programs</a
          >
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
